<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Graduation cap icon -->
  <g transform="translate(256,260)" fill="white">
    <!-- Cap top -->
    <polygon points="0,-120 160,-50 0,20 -160,-50" opacity="0.95"/>
    <!-- Cap brim shadow -->
    <polygon points="0,20 160,-50 160,-35 0,35 -160,-35 -160,-50" opacity="0.75"/>
    <!-- Tassel line -->
    <line x1="160" y1="-50" x2="160" y2="40" stroke="white" stroke-width="8" stroke-linecap="round"/>
    <circle cx="160" cy="50" r="12" fill="white"/>
    <!-- Strings -->
    <path d="M-90,-15 L-90,60 Q-90,90 -60,90 L60,90 Q90,90 90,60 L90,-15" stroke="white" stroke-width="8" fill="none" opacity="0.6"/>
  </g>
  <!-- E letter subtle -->
  <text x="256" y="420" text-anchor="middle" font-family="system-ui,sans-serif" font-size="72" font-weight="800" fill="white" opacity="0.9">EduMerge</text>
</svg>
